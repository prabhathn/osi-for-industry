# yaml-language-server: $schema=https://raw.githubusercontent.com/open-semantic-interchange/OSI/main/core-spec/osi-schema.json

# Add-on: Compliance & Audit
# Module: Regulatory compliance management, internal controls, and risk tracking
#
# This module is NOT universal — include it for enterprises operating in
# regulated industries (financial services, healthcare, pharmaceuticals,
# energy, defense) or those subject to frameworks such as SOX, GDPR, ISO 27001,
# SOC 2, PCI-DSS, HIPAA, Basel III, etc.
#
# Depends on: enterprise_core.yaml (indirect, via employee references)
#
# Cross-references (cross-file, encoded in ai_context):
#   - control.owner_employee_id              -> enterprise_hr.employee.employee_id
#   - audit_event.performed_by_employee_id   -> enterprise_hr.employee.employee_id

version: "0.1.1"

semantic_model:
  - name: enterprise_addon_compliance
    description: >
      Add-on module for governance, risk, and compliance (GRC) programs.
      Covers regulations and the controls defined to comply with them, audit
      events that test control effectiveness, and risks tracked against each
      control. Applicable to any compliance framework (SOX, GDPR, ISO 27001,
      SOC 2, PCI-DSS, HIPAA, etc.).
    ai_context:
      instructions: >
        Use this model for compliance posture analytics: control coverage,
        audit outcomes, open risks, and regulatory exposure.

        Data hierarchy:
          regulation -> control -> audit_event (test results)
          control -> risk (identified risks per control)

        control.owner_employee_id and audit_event.performed_by_employee_id
        reference enterprise_hr.employee (cross-file). Load enterprise_hr.yaml
        to resolve employee names.

        Risk scoring: inherent_risk_score and residual_risk_score are numeric
        values (e.g., 1-25 from a 5x5 likelihood x impact matrix). The exact
        scale is implementation-defined.

        To calculate overall compliance posture, combine audit_pass_rate
        with open_risk_count and high_risk_count metrics.

    datasets:

      # -----------------------------------------------------------------------
      # REGULATION — a law, standard, or framework the enterprise must comply with
      # -----------------------------------------------------------------------
      - name: regulation
        source: enterprise.compliance.regulation
        primary_key: [regulation_id]
        unique_keys:
          - [regulation_id]
          - [regulation_code]
        description: >
          A regulatory requirement, law, industry standard, or internal policy
          framework that the enterprise is obligated or has chosen to comply with.
          Examples: SOX, GDPR, PCI-DSS, ISO 27001, HIPAA, Basel III, CCPA.
        ai_context:
          synonyms:
            - "regulatory requirement"
            - "compliance framework"
            - "law"
            - "standard"
            - "policy"
        fields:
          - name: regulation_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: regulation_id
            description: Surrogate primary key.
            dimension:
              is_time: false

          - name: regulation_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: regulation_code
            description: Unique short code (e.g., 'SOX', 'GDPR', 'PCI-DSS', 'ISO27001').
            dimension:
              is_time: false

          - name: regulation_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: regulation_name
            description: Full name of the regulation or standard (e.g., 'Sarbanes-Oxley Act', 'General Data Protection Regulation').
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "regulation name"
                - "framework name"

          - name: jurisdiction
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: jurisdiction
            description: >
              Geographic or organizational scope of the regulation.
              Use ISO 3166-1 alpha-2 country codes for country-specific laws
              (e.g., 'US', 'EU'), or 'GLOBAL' for global standards.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "scope"
                - "geography"

          - name: authority
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: authority
            description: The governing body or standards organization responsible for this regulation (e.g., 'SEC', 'European Parliament', 'ISO', 'PCI SSC').
            dimension:
              is_time: false

          - name: effective_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_date
            description: Date the regulation became (or becomes) effective (ISO 8601).
            dimension:
              is_time: true

      # -----------------------------------------------------------------------
      # CONTROL — an action or mechanism to comply with a regulation
      # -----------------------------------------------------------------------
      - name: control
        source: enterprise.compliance.control
        primary_key: [control_id]
        unique_keys:
          - [control_id]
          - [control_code]
        description: >
          A specific process, policy, technical safeguard, or operational
          procedure implemented to satisfy one or more regulatory requirements.
          Each control is owned by an employee and tested periodically via
          audit events.
        ai_context:
          synonyms:
            - "internal control"
            - "safeguard"
            - "procedure"
            - "policy"
            - "control objective"
        fields:
          - name: control_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_id
            description: Surrogate primary key.
            dimension:
              is_time: false

          - name: control_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_code
            description: Unique reference code (e.g., 'SOX-IT-01', 'GDPR-DS-03').
            dimension:
              is_time: false

          - name: regulation_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: regulation_id
            description: Foreign key to regulation. The regulation this control satisfies.
            dimension:
              is_time: false

          - name: control_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_name
            description: Short name describing the control (e.g., 'Access Review – Privileged Accounts').
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "control name"
                - "control objective"

          - name: control_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_type
            description: >
              Nature of the control.
              Values: preventive, detective, corrective, directive, compensating.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "control category"
                - "type"

          - name: frequency
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: frequency
            description: >
              How often this control is executed or tested.
              Values: continuous, daily, weekly, monthly, quarterly, annual,
              event-driven.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "cadence"
                - "testing frequency"

          - name: owner_employee_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_employee_id
            description: Foreign key to enterprise_hr.employee (cross-file). The employee accountable for this control.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "control owner"
                - "responsible person"
                - "accountable party"

          - name: control_status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_status
            description: >
              Current status of the control.
              Values: active, inactive, under-remediation, retired.
            dimension:
              is_time: false

      # -----------------------------------------------------------------------
      # AUDIT_EVENT — a test or review of a control's effectiveness
      # -----------------------------------------------------------------------
      - name: audit_event
        source: enterprise.compliance.audit_event
        primary_key: [event_id]
        unique_keys:
          - [event_id]
        description: >
          Records a single test, review, or assessment of a control. Audit events
          may be self-assessments, internal audits, or external audits. The outcome
          indicates whether the control passed or a finding was raised.
        ai_context:
          synonyms:
            - "audit"
            - "control test"
            - "assessment"
            - "control review"
            - "finding"
        fields:
          - name: event_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: event_id
            description: Surrogate primary key.
            dimension:
              is_time: false

          - name: control_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_id
            description: Foreign key to control. The control being tested or reviewed.
            dimension:
              is_time: false

          - name: audit_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: audit_type
            description: >
              Type of audit or assessment.
              Values: self-assessment, internal-audit, external-audit,
              regulatory-exam, penetration-test.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "assessment type"
                - "review type"

          - name: performed_by_employee_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: performed_by_employee_id
            description: Foreign key to enterprise_hr.employee (cross-file). The auditor or reviewer who performed this test.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "auditor"
                - "reviewer"
                - "performed by"

          - name: event_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: event_date
            description: Date the audit event or test was performed (ISO 8601).
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "audit date"
                - "test date"
                - "review date"

          - name: outcome
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: outcome
            description: >
              Result of the audit event.
              Values: pass, fail, finding, not-applicable.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "result"
                - "audit result"
                - "test outcome"

          - name: notes
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: notes
            description: Free-text observations, evidence references, or finding descriptions.
            dimension:
              is_time: false

      # -----------------------------------------------------------------------
      # RISK — an identified risk associated with a control
      # -----------------------------------------------------------------------
      - name: risk
        source: enterprise.compliance.risk
        primary_key: [risk_id]
        unique_keys:
          - [risk_id]
          - [risk_code]
        description: >
          A documented risk that a control is designed to mitigate. Tracks
          inherent risk (before controls) and residual risk (after controls),
          likelihood and impact ratings, and current disposition.
        ai_context:
          synonyms:
            - "risk"
            - "risk item"
            - "risk register entry"
            - "compliance risk"
        fields:
          - name: risk_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: risk_id
            description: Surrogate primary key.
            dimension:
              is_time: false

          - name: risk_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: risk_code
            description: Unique reference code (e.g., 'RISK-GDPR-001', 'RISK-OPS-014').
            dimension:
              is_time: false

          - name: control_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: control_id
            description: Foreign key to control. The control that mitigates this risk.
            dimension:
              is_time: false

          - name: risk_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: risk_name
            description: Short name or title of the risk.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "risk title"
                - "risk description"

          - name: risk_category
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: risk_category
            description: >
              Domain of the risk.
              Values: operational, financial, cyber-security, legal, regulatory,
              reputational, strategic, third-party.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "risk type"
                - "risk domain"

          - name: likelihood
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: likelihood
            description: >
              Probability of the risk materializing.
              Values: high, medium, low.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "probability"
                - "frequency"

          - name: impact
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: impact
            description: >
              Severity of consequences if the risk materializes.
              Values: high, medium, low.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "severity"
                - "consequence"

          - name: inherent_risk_score
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: inherent_risk_score
            description: Numeric risk score before mitigating controls (e.g., 1-25 from a 5x5 matrix). Scale is implementation-defined.
            ai_context:
              synonyms:
                - "gross risk"
                - "raw risk score"

          - name: residual_risk_score
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: residual_risk_score
            description: Numeric risk score after mitigating controls are applied. Should be <= inherent_risk_score.
            ai_context:
              synonyms:
                - "net risk"
                - "remaining risk"
                - "residual risk"

          - name: risk_status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: risk_status
            description: >
              Current disposition of the risk.
              Values: open, mitigated, accepted, transferred, closed.
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "risk disposition"
                - "treatment"
                - "status"

    # -------------------------------------------------------------------------
    # RELATIONSHIPS
    # -------------------------------------------------------------------------
    relationships:
      - name: control_to_regulation
        from: control
        to: regulation
        from_columns: [regulation_id]
        to_columns: [regulation_id]
        ai_context:
          synonyms:
            - "control satisfies regulation"

      - name: audit_event_to_control
        from: audit_event
        to: control
        from_columns: [control_id]
        to_columns: [control_id]
        ai_context:
          synonyms:
            - "audit tests control"

      - name: risk_to_control
        from: risk
        to: control
        from_columns: [control_id]
        to_columns: [control_id]
        ai_context:
          synonyms:
            - "risk mitigated by control"

    # -------------------------------------------------------------------------
    # METRICS
    # -------------------------------------------------------------------------
    metrics:
      - name: control_coverage_pct
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                COUNT(DISTINCT CASE WHEN control.control_status = 'active'
                               THEN control.control_id END)
                * 100.0
                / NULLIF(COUNT(DISTINCT control.control_id), 0)
        description: Percentage of all defined controls that are currently active (not retired or under remediation).
        ai_context:
          synonyms:
            - "active control rate"
            - "control coverage"

      - name: audit_pass_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                COUNT(CASE WHEN audit_event.outcome = 'pass' THEN 1 END)
                * 100.0
                / NULLIF(COUNT(CASE WHEN audit_event.outcome IN ('pass','fail','finding') THEN 1 END), 0)
        description: Percentage of audit events with a passing outcome (excludes not-applicable events from denominator).
        ai_context:
          synonyms:
            - "control effectiveness"
            - "test pass rate"
            - "audit success rate"

      - name: open_risk_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                COUNT(CASE WHEN risk.risk_status = 'open' THEN 1 END)
        description: Number of risks currently in open status (not yet mitigated, accepted, or closed).
        ai_context:
          synonyms:
            - "open risks"
            - "unmitigated risks"
            - "outstanding risks"

      - name: high_risk_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                COUNT(CASE WHEN risk.likelihood = 'high' AND risk.impact = 'high'
                              AND risk.risk_status NOT IN ('mitigated','closed','transferred')
                           THEN 1 END)
        description: Number of open risks with both high likelihood and high impact — the highest priority risk items.
        ai_context:
          synonyms:
            - "critical risks"
            - "high-high risks"
            - "top risks"

      - name: avg_residual_risk_score
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(risk.residual_risk_score)
        description: Average residual risk score across all risks in scope. Lower is better.
        ai_context:
          synonyms:
            - "average risk score"
            - "risk posture"
            - "overall risk level"
