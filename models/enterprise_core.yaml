            - "list price"
            - "unit price"
        fields:
          - name: price_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: price_id
            description: Surrogate primary key.
            dimension:
              is_time: false

          - name: product_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_id
            description: Foreign key to product.
            dimension:
              is_time: false

          - name: price_list_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: price_list_id
            description: Foreign key to price_list.
            dimension:
              is_time: false

          - name: unit_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: unit_price
            description: Price per one unit_of_measure of the product, in the currency of the price list.
            ai_context:
              synonyms:
                - "price"
                - "list price"
                - "rate"

          - name: effective_from
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_from
            description: Date from which this price is effective.
            dimension:
              is_time: true

          - name: effective_to
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_to
            description: Date after which this price expires. NULL means currently active.
            dimension:
              is_time: true

