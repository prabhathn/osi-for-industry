      # -----------------------------------------------------------------------
      # PRODUCT_PRICE — unit price of a product within a price list
      # -----------------------------------------------------------------------
      - name: product_price
        source: enterprise.core.product_price
        primary_key: [price_id]
        unique_keys:
          - [price_id]
          - [product_id, price_list_id, effective_from]
        description: >
          The unit price of a product within a specific price list, valid for
          a given date range. Supports price history and future pricing.
        ai_context:
          synonyms:
