    # -------------------------------------------------------------------------
    # METRICS
    # -------------------------------------------------------------------------
    metrics:
      - name: total_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN gl_account.account_type = 'revenue'
                         THEN journal_line.credit_amount - journal_line.debit_amount
                         ELSE 0 END)
        description: Total revenue recognized in the period. Derived from journal lines posted to revenue accounts.
        ai_context:
          synonyms:
            - "revenue"
            - "sales"
            - "income"
            - "top line"

      - name: total_expenses
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN gl_account.account_type = 'expense'
                         THEN journal_line.debit_amount - journal_line.credit_amount
                         ELSE 0 END)
        description: Total expenses recognized in the period. Derived from journal lines posted to expense accounts.
        ai_context:
          synonyms:
            - "expenses"
            - "costs"
            - "operating expenses"
            - "OPEX"

      - name: net_income
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN gl_account.account_type = 'revenue'
                         THEN journal_line.credit_amount - journal_line.debit_amount
                         WHEN gl_account.account_type = 'expense'
                         THEN journal_line.debit_amount - journal_line.credit_amount
                         ELSE 0 END)
        description: Net income (revenue minus expenses) for the period.
        ai_context:
          synonyms:
            - "profit"
            - "net profit"
            - "bottom line"
            - "earnings"

      - name: total_ar_outstanding
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN invoice.invoice_type = 'AR'
                         THEN invoice.total_amount - invoice.paid_amount
                         ELSE 0 END)
        description: Total outstanding accounts receivable balance (unpaid AR invoice amounts).
        ai_context:
          synonyms:
            - "AR balance"
            - "receivables"
            - "outstanding receivables"
            - "amount owed by customers"

      - name: total_ap_outstanding
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN invoice.invoice_type = 'AP'
                         THEN invoice.total_amount - invoice.paid_amount
                         ELSE 0 END)
        description: Total outstanding accounts payable balance (unpaid AP invoice amounts).
        ai_context:
          synonyms:
            - "AP balance"
            - "payables"
            - "outstanding payables"
            - "amount owed to suppliers"

      - name: budget_variance
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(journal_line.debit_amount - journal_line.credit_amount)
                - SUM(budget.budgeted_amount)
        description: >
          Actual spending versus budgeted amount. Positive = over budget;
          negative = under budget. Requires joining journal_line to gl_account
          and budget on the same account and period.
        ai_context:
          synonyms:
            - "variance"
            - "budget vs actual"
            - "over/under budget"

      - name: days_sales_outstanding
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN invoice.invoice_type = 'AR'
                         THEN invoice.total_amount - invoice.paid_amount
                         ELSE 0 END)
                / NULLIF(SUM(CASE WHEN invoice.invoice_type = 'AR'
                                  THEN invoice.total_amount
                                  ELSE 0 END), 0) * 90
        description: >
          Approximate days sales outstanding (DSO): ratio of outstanding AR to
          total AR invoiced, scaled to a 90-day window. A lower value is better.
        ai_context:
          synonyms:
            - "DSO"
            - "days to collect"
            - "collection period"

      - name: days_payable_outstanding
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: >
                SUM(CASE WHEN invoice.invoice_type = 'AP'
                         THEN invoice.total_amount - invoice.paid_amount
                         ELSE 0 END)
                / NULLIF(SUM(CASE WHEN invoice.invoice_type = 'AP'
                                  THEN invoice.total_amount
                                  ELSE 0 END), 0) * 90
        description: >
          Approximate days payable outstanding (DPO): ratio of outstanding AP to
          total AP invoiced, scaled to a 90-day window. A higher value indicates
          longer time to pay suppliers.
        ai_context:
          synonyms:
            - "DPO"
            - "days to pay"
            - "payment period"
